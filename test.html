<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <!-- 给不同级别的标题设置不同颜色 -->
        <style>
            h1 {
                color: aqua;
            }
            h2 {
                color: black;
            }
            h3 {
                color: blue;
            }
            h4 {
                color: red;
            }
            h5 {
                color: green;
            }
            h6 {
                color: pink;
            }
            p {
                color: wheat;
            }
        </style>
    </head>
    <body>
        <!-- 清除现有标题内联样式 -->
        <h1>标题1</h1>
        <h2>二级标题</h2>
        <h3></h3>
        <!-- 四级标题 -->
        <h4>四级标题</h4>
        <h5>五级标题</h5>
        <h6>六级标题</h6>
        <h6>六级标题 六级标题</h6>

        <p style="color: wheat"></p>
        <p>这是一个段落</p>
        <p>这是第二个段落</p>
        <a href="https://www.baidu.com">百度</a>

        <p>我不是一个段落</p>
        <!-- 三级标题 -->
        <h3 style="color: blue">三级标题</h3>
    </body>
</html>
